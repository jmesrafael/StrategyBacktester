<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chart Replay — TradingView-style</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="app">

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="tb-left">
      <select id="symbol" class="sym-select" title="Symbol"></select>

      <!-- TF tabs + manage dropdown -->
      <div class="tf-picker" id="tfPicker">
        <div class="tf-tabs" id="tfTabs"></div>
        <button class="tf-manage-btn iconbtn" id="tfManageBtn" title="Manage timeframes"><i class="fas fa-chevron-down tf-caret"></i></button>
        <div class="tf-menu" id="tfMenu"></div>
      </div>

      <!-- chart type picker -->
      <div class="picker">
        <button class="iconbtn tb-icon" id="candleStyleBtn" title="Chart type">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="5" y="7" width="4" height="10" rx="1"/><path d="M7 4v3M7 17v3"/>
            <rect x="15" y="5" width="4" height="9" rx="1"/><path d="M17 2v3M17 14v3"/>
          </svg>
        </button>
        <div class="menu" id="candleStyleMenu">
          <button data-style="candlestick" class="menu-item active">Candlestick</button>
          <button data-style="heiken_ashi" class="menu-item">Heikin Ashi</button>
          <button data-style="line" class="menu-item">Line</button>
        </div>
      </div>

      <button class="tb-btn" id="indicatorsBtn">Indicators <span class="badge" id="indBadge"></span></button>
      <button class="tb-btn" id="strategyBtn">Strategy</button>
      <button class="tb-btn" id="replayBtn">Replay</button>
      <button class="tb-btn" id="dataBtn">Data</button>
    </div>

    <div class="tb-right">
      <span class="status" id="status"></span>
      <div class="field-inline">
        <label>Max candles</label>
        <select id="maxCandles"></select>
      </div>
      <button class="iconbtn tb-icon" id="toolbarToggle" title="Toggle drawing toolbar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h10M4 12h16M4 18h7"/></svg>
      </button>
      <button class="iconbtn tb-icon" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== STAGE: chart (floating toolbar lives inside chartHost) ===== -->
  <div class="stage">
    <div class="chart-host" id="chartHost">
      <div id="chart"></div>

      <!-- permanent refresh button, centered top of the chart (all modes) -->
      <button class="chart-refresh" id="refreshBtn" title="Refresh chart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11a8 8 0 1 0-.5 4"/><path d="M20 4v7h-7"/></svg>
      </button>

      <!-- replay arming hint (scissors mode, before the cut point is chosen) -->
      <div class="cut-hint" id="cutHint"><i class="fas fa-scissors"></i> Double-click a candle to set the replay start point</div>

      <!-- right-click context menu -->
      <div class="ctx-menu" id="ctxMenu"></div>

      <!-- floating drawing toolbar (TradingView-style favorites bar) -->
      <div class="float-toolbar" id="toolbar">
        <div class="ft-grip" id="ftGrip" title="Drag toolbar">
          <svg viewBox="0 0 8 16" fill="currentColor" width="8" height="16">
            <circle cx="2" cy="3"  r="1.2"/><circle cx="6" cy="3"  r="1.2"/>
            <circle cx="2" cy="8"  r="1.2"/><circle cx="6" cy="8"  r="1.2"/>
            <circle cx="2" cy="13" r="1.2"/><circle cx="6" cy="13" r="1.2"/>
          </svg>
        </div>
        <button class="iconbtn active" data-tool="cursor" title="Cursor (Esc)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 8-6 1.5L10 19 5 3z"/></svg>
        </button>
        <div class="ft-sep"></div>
        <button class="iconbtn" data-tool="trend" title="Trend line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18L20 6"/><circle cx="4" cy="18" r="2" fill="currentColor"/><circle cx="20" cy="6" r="2" fill="currentColor"/></svg>
        </button>
        <button class="iconbtn" data-tool="hline" title="Horizontal ray">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h16"/><circle cx="5" cy="12" r="2" fill="currentColor"/></svg>
        </button>
        <button class="iconbtn" data-tool="vline" title="Vertical line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16"/><circle cx="12" cy="4" r="2" fill="currentColor"/></svg>
        </button>
        <button class="iconbtn" data-tool="rect" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
        </button>
        <div class="ft-sep"></div>
        <button class="iconbtn" id="clearBtn" title="Clear all drawings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== REPLAY TRANSPORT — shown via body.replay-mode ===== -->
  <div class="replaybar">
    <div class="rb-left">
      <button class="rb-exit-btn" id="exitReplayBtn" title="Exit replay"><i class="fas fa-xmark"></i> Exit</button>
      <div class="seg mode-seg" id="modeTabs">
        <button data-mode="game" class="active"><i class="fas fa-gamepad"></i> Game</button>
        <button data-mode="strategy"><i class="fas fa-bolt"></i> Strategy</button>
      </div>
    </div>

    <div class="rb-center">
      <div class="transport">
        <button class="iconbtn" id="rewindBtn" title="Rewind to start">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6L11 12l9 6z"/></svg>
        </button>
        <button class="iconbtn primary" id="playBtn" title="Play / Pause (Space)">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="iconbtn" id="stepBtn" title="Step forward one candle (→)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 5l9 7-9 7zM16 5h2v14h-2z"/></svg>
        </button>
      </div>
    </div>

    <div class="rb-right">
      <div class="field-inline">
        <label>Speed</label>
        <select id="speed"></select>
      </div>
      <!-- Formation dropup -->
      <div class="fm-picker" id="fmPicker">
        <button class="fm-btn" id="fmBtn">Formation: <span id="fmLabel">Candle</span> <svg viewBox="0 0 10 6" width="8" height="5" fill="currentColor"><path d="M0 6L5 0l5 6z"/></svg></button>
        <div class="fm-menu" id="fmMenu">
          <button class="fm-opt fm-active" data-v="candle">Candle — one bar at a time</button>
          <button class="fm-opt" data-v="realistic">Realistic — animated tick by tick</button>
        </div>
      </div>
      <span class="pill" id="livePill">paused</span>
    </div>
  </div>

  <!-- ===== BOTTOM BAR: OHLCV under cursor ===== -->
  <div class="bottombar">
    <div class="ohlcv" id="ohlcv"></div>
    <div class="draw-info" id="drawInfo"></div>
  </div>

  <!-- ===== DATA PAGE ===== -->
  <section class="data-page" id="dataPage">
    <div class="data-page-header">
      <h2 class="data-page-title">Saved Backtests</h2>
      <button class="tb-btn" id="dataBackBtn"><i class="fas fa-arrow-left"></i> Chart</button>
    </div>
    <div class="data-grid" id="dataGrid"></div>
  </section>
</div>

<script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/api.js"></script>
<script src="js/indicators.js"></script>
<script src="js/chart.js"></script>
<script src="js/indicators-ui.js"></script>
<script src="js/replay.js"></script>
<script src="js/drawings.js"></script>
<script src="js/fvg.js"></script>
<script src="js/trade-sim.js"></script>
<script src="strategies/registry.js"></script>
<script src="strategies/ema-rsi-divergence-strategy.js"></script>
<script src="strategies/emacross-strategy.js"></script>
<script src="strategies/rsi-strategy.js"></script>
<script src="js/strategy.js"></script>
<script src="js/data-page.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
</body>
</html>
